denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3


# inference
data_path: checkpoints/vidprom_filtered_extended.txt
output_folder: datasets
num_output_frames: 90
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0

generator_ckpt: checkpoints/longlive_base.pt
lora_ckpt: checkpoints/longlive_lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false

# Latent generation settings
latent_only: true           # Skip video saving, only save latents
sample_ratio: 0.1           # Generate 10% of prompts
max_video_saves: 2          # Save first N videos for verification
