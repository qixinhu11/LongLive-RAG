# LongLive baseline (no retrieval, sliding-window only).
denoising_step_list: [1000, 750, 500, 250]
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B

model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 1

generator_ckpt: checkpoints/longlive_base.pt
lora_ckpt:      checkpoints/longlive_lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false

# inference
data_path: checkpoints/moviegenbench_128_refined.txt
output_folder: videos/longlive/native
inference_iter: -1
skip_existing: true
num_output_frames: 120
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0
